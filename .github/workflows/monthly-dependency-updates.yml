name: Monthly dependency updates

on:
  schedule:
    # 09:00 UTC on the 1st of every month
    - cron: "0 9 1 * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  list-packages:
    name: List dependency package names
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.matrix.outputs.packages }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build package matrix
        id: matrix
        run: |
          json=$(jq -c '[(.dependencies // {} | keys), (.devDependencies // {} | keys)] | add | unique | sort' package.json)
          echo "packages=$json" >> "$GITHUB_OUTPUT"

  update-one-package:
    name: Bump ${{ matrix.package }}
    needs: list-packages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        package: ${{ fromJSON(needs.list-packages.outputs.packages) }}
    env:
      HUSKY: "0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Branch slug for ${{ matrix.package }}
        id: slug
        run: |
          s=$(echo "${{ matrix.package }}" | sed 's/^@//; s/\//-/g' | tr '[:upper:]' '[:lower:]')
          echo "value=$s" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update ${{ matrix.package }} to latest
        run: pnpm update "${{ matrix.package }}"@latest

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore(deps): bump ${{ matrix.package }} to latest"
          title: "chore(deps): bump ${{ matrix.package }} to latest"
          body: |
            Automated monthly bump for **`${{ matrix.package }}`** using `pnpm update` to the latest semver range.

            Review the changelog and CI before merging. This workflow only opens the PR; it does not merge.
          branch: chore/deps-${{ steps.slug.outputs.value }}-${{ github.run_id }}
          delete-branch: true
